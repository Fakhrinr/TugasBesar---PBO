# ============================================================
# application.properties
# Taruh di: src/main/resources/application.properties
# ============================================================

# ── Database connection ──────────────────────────────────────
# Ganti "crm_db" dengan nama database MySQL kamu
spring.datasource.url=jdbc:mysql://localhost:3306/crm_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=           
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── SQL init ─────────────────────────────────────────────────
# Ini yang bikin Spring Boot otomatis jalanin schema.sql saat startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ── Thymeleaf ────────────────────────────────────────────────
# Beritahu Spring Boot dimana letak file HTML kamu
spring.thymeleaf.prefix=classpath:/frontend/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ── App name ─────────────────────────────────────────────────
spring.application.name=CRM-ISP