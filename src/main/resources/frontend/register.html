<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — CRM ISP</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
</head>

<body>
    <div class="card">
        <h1>Sign up your account</h1>
        <div class="alert-error" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/register}" th:object="${registerRequest}" method="post"
            onsubmit="return checkPwd('pwd','cpwd')">
            <div class="field"><input type="text" th:field="*{name}" placeholder="Name" autocomplete="name" required />
            </div>
            <div class="field"><input type="email" th:field="*{email}" placeholder="Email" autocomplete="email"
                    required /></div>
            <div class="field password-wrap">
                <input type="password" id="pwd" th:field="*{password}" placeholder="Password"
                    autocomplete="new-password" required />
                <button type="button" class="eye-btn" onclick="togglePwd('pwd',this)"><svg viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg></button>
            </div>
            <div class="field password-wrap">
                <input type="password" id="cpwd" placeholder="Confirmation Password" autocomplete="new-password"
                    required />
                <button type="button" class="eye-btn" onclick="togglePwd('cpwd',this)"><svg viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg></button>
            </div>
            <div class="field"><input type="text" th:field="*{address}" placeholder="Address"
                    autocomplete="street-address" required /></div>
            <div class="field"><input type="tel" th:field="*{phone}" placeholder="Phone Number" autocomplete="tel"
                    required /></div>
            <button type="submit" class="btn-primary">Sign Up</button>
        </form>
        <p class="footer-text">Do you have an account? <a th:href="@{/login}">Sign In</a></p>
    </div>
    <script th:src="@{/js/auth.js}"></script>
</body>

</html>
