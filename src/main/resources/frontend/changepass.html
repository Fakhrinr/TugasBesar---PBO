<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password — CRM ISP</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
</head>

<body>
    <div class="card card-with-back">
        <a th:href="@{/forgot-password}" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M5 12l7 7M5 12l7-7" />
            </svg></a>
        <h1>Change Password</h1>
        <p class="subtitle">Update password for enchanted account security.</p>
        <div class="alert-error" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/change-password}" th:object="${resetRequest}" method="post"
            onsubmit="return checkPwd('newPwd','confPwd')">
            <input type="hidden" th:field="*{email}" th:value="${email}" />
            <div class="field password-wrap">
                <input type="password" id="newPwd" th:field="*{newPassword}" placeholder="Password"
                    autocomplete="new-password" required />
                <button type="button" class="eye-btn" onclick="togglePwd('newPwd',this)"><svg viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg></button>
            </div>
            <div class="field password-wrap">
                <input type="password" id="confPwd" placeholder="Confirmation Password" autocomplete="new-password"
                    required />
                <button type="button" class="eye-btn" onclick="togglePwd('confPwd',this)"><svg viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg></button>
            </div>
            <button type="submit" class="btn-primary">Confirm</button>
        </form>
    </div>
    <script th:src="@{/js/auth.js}"></script>
</body>

</html>
