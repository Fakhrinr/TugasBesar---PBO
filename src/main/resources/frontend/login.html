<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — CRM ISP</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>
<div class="card">
  <h1>Sign in with email</h1>
  <p class="subtitle">Please Log in to your account</p>
  <div class="alert-error"   th:if="${error}"   th:text="${error}"></div>
  <div class="alert-success" th:if="${success}" th:text="${success}"></div>
  <form th:action="@{/login}" th:object="${loginRequest}" method="post">
    <div class="field">
      <input type="email" th:field="*{email}" placeholder="Email" autocomplete="email" required/>
    </div>
    <div class="field password-wrap">
      <input type="password" id="pwd" th:field="*{password}" placeholder="Password" autocomplete="current-password" required/>
      <button type="button" class="eye-btn" onclick="togglePwd('pwd',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="forgot-row"><a th:href="@{/forgot-password}">Forgot Password?</a></div>
    <button type="submit" class="btn-primary">Log In</button>
  </form>
  <p class="footer-text">Don't you have an account? <a th:href="@{/register}">Sign up</a></p>
</div>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
