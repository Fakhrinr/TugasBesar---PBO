<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — CRM ISP</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>
<div class="card card-with-back">
  <a th:href="@{/login}" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg></a>
  <h1>Reset Password</h1>
  <p class="subtitle">Please enter your email to reset your password.</p>
  <div class="alert-error" th:if="${error}" th:text="${error}"></div>
  <form th:action="@{/forgot-password}" th:object="${resetRequest}" method="post">
    <div class="field"><input type="email" th:field="*{email}" placeholder="Email" autocomplete="email" required/></div>
    <button type="submit" class="btn-primary">Confirm</button>
  </form>
</div>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
