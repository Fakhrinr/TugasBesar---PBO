<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <i class="bi bi-kanban-fill"></i>
        </div>

        <div class="menu">
            <div class="menu-item"><i class="bi bi-grid-fill"></i></div>
            <div class="menu-item"><i class="bi bi-file-earmark-text-fill"></i></div>
            <div class="menu-item"><i class="bi bi-calendar"></i></div>
            <div class="menu-item"><i class="bi bi-cloud-arrow-up"></i></div>
        </div>

        <div class="menu-item logout">
            <i class="bi bi-box-arrow-right"></i>
        </div>
    </div>

    <div class="main-content">

        <div class="topbar">
            <h2>Notification</h2>

            <div class="topbar-right">
                <i class="bi bi-bell bell-icon"></i>
                <img src="https://randomuser.me/api/portraits/men/32.jpg" class="profile-img" alt="Profile">
            </div>
        </div>

        <div class="notification-container">

            <div class="notification-card">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="User">

                <div class="notification-content">
                    <div class="notification-text">
                        <strong>Larry Luciano</strong>
                        <span>Changed the due date of</span>
                        <span class="target">Monthly Team Meeting</span>
                        <span>to Sep 12</span>
                    </div>

                    <div class="notification-time">
                        3 Hours ago
                    </div>
                </div>
            </div>

            <div class="notification-card">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="User">

                <div class="notification-content">
                    <div class="notification-text">
                        <strong>Larry Luciano</strong>
                        <span>Asking for edit access in</span>
                        <span class="target">Monthly Team Progress</span>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-decline">Decline</button>
                        <button class="btn-accept">Accept</button>
                    </div>

                    <div class="notification-time">
                        3 Hours ago
                    </div>
                </div>
            </div>

            <div class="notification-card">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="User">

                <div class="notification-content">
                    <div class="notification-text">
                        <strong>Larry Luciano</strong>
                        <span>Changed the due date of</span>
                        <span class="target">Monthly Team Meeting</span>
                        <span>to Sep 12</span>
                    </div>

                    <div class="notification-time">
                        3 Hours ago
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
